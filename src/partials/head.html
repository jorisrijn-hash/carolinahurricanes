<script>
/* Two lines, inline, before first paint: flag JS, and apply the stored data
   saver choice so the page never flashes heavy imagery before the
   preference module loads. */
document.documentElement.className = document.documentElement.className.replace('no-js', 'js');
try {
  var p = JSON.parse(localStorage.getItem('canes:prefs') || '{}');
  if (p.dataSaver) document.documentElement.classList.add('data-saver');
  if (p.motion) document.documentElement.setAttribute('data-motion', p.motion);
} catch (e) {}
</script>
{{jsonld}}
